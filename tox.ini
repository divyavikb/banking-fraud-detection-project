[tox]
envlist = py39,py310,py311,lint,docs
skipsdist = False

[testenv]
deps =
    -r{toxinidir}/requirements.txt
    -r{toxinidir}/requirements-dev.txt
commands =
    pytest tests/ -v --cov=src --cov-report=html --cov-report=term

[testenv:lint]
deps =
    black
    flake8
    mypy
    isort
commands =
    black --check src/ tests/
    flake8 src/ tests/ --max-line-length=100
    mypy src/ --ignore-missing-imports
    isort --check-only src/ tests/

[testenv:format]
deps =
    black
    isort
commands =
    black src/ tests/
    isort src/ tests/

[testenv:docs]
changedir = docs
deps =
    sphinx
    sphinx-rtd-theme
commands =
    sphinx-build -W -b html -d {envtmpdir}/doctrees . {envtmpdir}/html

[flake8]
max-line-length = 100
exclude = .git,__pycache__,docs,build,dist,.tox,.eggs
ignore = E203,W503,E501

[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --strict-markers
    --cov=src
    --cov-report=term-missing
    --cov-report=html

[coverage:run]
source = src
omit = 
    */tests/*
    */venv/*
    */__pycache__/*

[coverage:report]
precision = 2
show_missing = True
