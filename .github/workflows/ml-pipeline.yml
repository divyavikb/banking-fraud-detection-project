name: ML Pipeline CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.9'
  AWS_REGION: us-east-1

jobs:
  lint-and-test:
    name: Code Quality & Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
        pip install -e .
    
    - name: Run Black (code formatting)
      run: black --check src/ tests/
    
    - name: Run Flake8 (linting)
      run: flake8 src/ tests/ --max-line-length=100 --exclude=__pycache__
    
    - name: Run MyPy (type checking)
      run: mypy src/ --ignore-missing-imports
      continue-on-error: true
    
    - name: Run pytest
      run: |
        pytest tests/ -v --cov=src --cov-report=xml --cov-report=html
    
    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
      if: always()
  
  data-validation:
    name: Data Validation
    runs-on: ubuntu-latest
    needs: lint-and-test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install -e .
    
    - name: Download and validate data
      run: |
        python src/data/make_dataset.py data/raw data/processed
    
    - name: Upload data artifacts
      uses: actions/upload-artifact@v3
      with:
        name: processed-data
        path: data/processed/
        retention-days: 7
  
  train-model:
    name: Train ML Model
    runs-on: ubuntu-latest
    needs: data-validation
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install -e .
    
    - name: Download data artifacts
      uses: actions/download-artifact@v3
      with:
        name: processed-data
        path: data/processed/
    
    - name: Build features
      run: |
        python src/features/build_features.py data/processed data/processed
    
    - name: Train XGBoost model
      run: |
        python src/models/train_model.py --model xgboost --data-path data/processed --output models/
    
    - name: Generate visualizations
      run: |
        python src/visualization/visualize.py
    
    - name: Upload model artifacts
      uses: actions/upload-artifact@v3
      with:
        name: trained-models
        path: models/
        retention-days: 30
    
    - name: Upload reports
      uses: actions/upload-artifact@v3
      with:
        name: reports
        path: reports/
        retention-days: 30
  
  deploy-to-staging:
    name: Deploy to AWS (Staging)
    runs-on: ubuntu-latest
    needs: train-model
    if: github.ref == 'refs/heads/develop'
    environment: staging
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Download model artifacts
      uses: actions/download-artifact@v3
      with:
        name: trained-models
        path: models/
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install dependencies
      run: |
        pip install boto3 sagemaker
    
    - name: Deploy to SageMaker (Staging)
      run: |
        python src/deployment/sagemaker_deploy.py
      env:
        SAGEMAKER_ROLE: ${{ secrets.SAGEMAKER_ROLE }}
        ENVIRONMENT: staging
  
  deploy-to-production:
    name: Deploy to AWS (Production)
    runs-on: ubuntu-latest
    needs: train-model
    if: github.ref == 'refs/heads/main'
    environment: production
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Download model artifacts
      uses: actions/download-artifact@v3
      with:
        name: trained-models
        path: models/
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install dependencies
      run: |
        pip install boto3 sagemaker
    
    - name: Deploy to SageMaker (Production)
      run: |
        python src/deployment/sagemaker_deploy.py
      env:
        SAGEMAKER_ROLE: ${{ secrets.SAGEMAKER_ROLE }}
        ENVIRONMENT: production
    
    - name: Run smoke tests
      run: |
        python tests/integration/test_endpoint.py
      continue-on-error: true
    
    - name: Notify deployment
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        text: 'Production deployment completed!'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
      if: always()
