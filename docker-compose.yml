version: '3.8'

services:
  api:
    build: .
    container_name: credit-risk-api
    ports:
      - "5000:5000"
    volumes:
      - ./models:/app/models
      - ./data/processed:/app/data/processed
      - ./src:/app/src
    environment:
      - FLASK_ENV=development
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

