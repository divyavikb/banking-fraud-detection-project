stages:
  data_ingestion:
    cmd: python src/data/data_ingestion.py
    deps:
    - src/data/data_ingestion.py
    outs:
    - data/raw
  data_validation:
    cmd: python src/data/data_validation.py
    deps:
    - src/data/data_validation.py
    - data/raw/fraud_data_raw.csv
    outs:
    - reports/validation_report.json

  data_visualization:
    cmd: python src/visualization/data_visualization.py
    deps:
    - src/visualization/data_visualization.py
    - data/raw/fraud_data_raw.csv
    outs:
    - reports/figures

  feature_extraction:
    cmd: python src/features/feature_extraction.py
    deps:
    - src/features/feature_extraction.py
    - data/raw/fraud_data_raw.csv
    outs:
    - data/processed/features_engineered.csv
  model_training:
    cmd: python src/models/train.py
    deps:
    - src/models/train.py
    - data/processed/features_engineered.csv
    params:
      - model_training.test_size
      
    outs:
    - models/scaler.joblib
    - models/model.joblib
    - data/final/train.csv
    - data/final/test.csv
  model_tuning:
    cmd: python src/models/hyperparameter_tuning.py
    deps:
      - src/models/hyperparameter_tuning.py
      - data/final/train.csv
    outs:
      - models/best_model_tuned.joblib  
  model_evaluation:
    cmd: python src/models/model_evaluate.py
    deps:
      - src/models/model_evaluate.py
      - data/final/test.csv
      - models/best_model_tuned.joblib
      - models/scaler.joblib
    outs:
      - reports/evaluation_report.txt
      - data/processed/predictions.csv
  


    
      



